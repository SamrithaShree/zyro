<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyro</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #060912;
      --surf: #0e1420;
      --surf2: #161e2c;
      --bdr: rgba(255, 255, 255, .07);
      --a: #00e5a0;
      --a2: #0ea5e9;
      --a3: #f59e0b;
      --r: #ef4444;
      --t: #edf2f7;
      --m: #5a7080;
      --sub: #192030;
      --card: rgba(255, 255, 255, .035)
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--t);
      font-family: 'DM Sans', sans-serif
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden
    }

    #shell {
      width: 390px;
      height: 100vh;
      max-height: 820px;
      background: var(--surf);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative
    }

    @media(min-width:500px) {
      #shell {
        border-radius: 28px;
        border: 1px solid var(--bdr);
        box-shadow: 0 40px 80px rgba(0, 0, 0, .7)
      }
    }

    /* ── screens ── */
    .pg {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      overflow-y: auto;
      overflow-x: hidden
    }

    .pg::-webkit-scrollbar {
      width: 3px
    }

    .pg::-webkit-scrollbar-thumb {
      background: var(--a)
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideR {
      from {
        opacity: 0;
        transform: translateX(20px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 14px rgba(0, 229, 160, .2)
      }

      50% {
        box-shadow: 0 0 32px rgba(0, 229, 160, .55)
      }
    }

    @keyframes big {
      from {
        opacity: 0;
        transform: scale(.6)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes radar {
      0% {
        transform: scale(.5);
        opacity: .8
      }

      100% {
        transform: scale(2.6);
        opacity: 0
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(-5px) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(180px) rotate(500deg);
        opacity: 0
      }
    }

    @keyframes fillW {
      from {
        width: 0
      }

      to {
        width: var(--w)
      }
    }

    /* ── buttons ── */
    .btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .bp {
      background: linear-gradient(135deg, #00e5a0, #00cce0);
      color: #060912
    }

    .bp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 229, 160, .32)
    }

    .bs {
      background: var(--card);
      border: 1px solid var(--bdr);
      color: var(--t)
    }

    .bd {
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #fff
    }

    .bo {
      background: transparent;
      border: 1.5px solid var(--a);
      color: var(--a)
    }

    .bsm {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 10px;
      width: auto
    }

    /* ── tags ── */
    .tg {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .tg-g {
      background: rgba(0, 229, 160, .1);
      color: var(--a);
      border: 1px solid rgba(0, 229, 160, .2)
    }

    .tg-b {
      background: rgba(14, 165, 233, .1);
      color: var(--a2);
      border: 1px solid rgba(14, 165, 233, .2)
    }

    .tg-y {
      background: rgba(245, 158, 11, .1);
      color: var(--a3);
      border: 1px solid rgba(245, 158, 11, .2)
    }

    .tg-r {
      background: rgba(239, 68, 68, .1);
      color: var(--r);
      border: 1px solid rgba(239, 68, 68, .2)
    }

    /* ── cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 15px;
      padding: 15px
    }

    .cg {
      box-shadow: 0 0 26px rgba(0, 229, 160, .1)
    }

    /* ── form ── */
    .fl {
      font-size: 11px;
      font-weight: 700;
      color: var(--m);
      text-transform: uppercase;
      letter-spacing: .07em;
      display: block;
      margin-bottom: 6px
    }

    .fi {
      width: 100%;
      padding: 13px 14px;
      background: var(--sub);
      border: 1.5px solid var(--bdr);
      border-radius: 11px;
      color: var(--t);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s
    }

    .fi:focus {
      border-color: rgba(0, 229, 160, .5)
    }

    .icon-input {
      position: relative;
      margin-bottom: 14px
    }

    .icon-input svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .4;
      pointer-events: none
    }

    .icon-input .fi {
      padding-left: 42px
    }

    /* ── progress bar ── */
    .pb {
      height: 4px;
      background: var(--sub);
      border-radius: 2px;
      overflow: hidden
    }

    .pbf {
      height: 100%;
      background: linear-gradient(90deg, var(--a), var(--a2));
      border-radius: 2px;
      transition: width .4s
    }

    /* ── stat grid ── */
    .sg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .sc {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 13px;
      padding: 12px
    }

    .sv {
      font-family: 'Space Mono', monospace;
      font-size: 19px;
      font-weight: 700;
      margin-top: 3px
    }

    .sl {
      font-size: 11px;
      color: var(--m);
      text-transform: uppercase;
      letter-spacing: .05em
    }

    /* ── live dot ── */
    .ld {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--a);
      animation: pulse 1.4s infinite;
      display: inline-block;
      flex-shrink: 0
    }

    .ld.r {
      background: var(--r)
    }

    /* ── tabs ── */
    .tabs {
      display: flex;
      background: var(--surf2);
      border-radius: 11px;
      padding: 4px;
      margin-bottom: 18px
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      color: var(--m);
      transition: all .2s
    }

    .tab.on {
      background: var(--a);
      color: #060912
    }

    /* ── option tiles ── */
    .opt {
      padding: 13px 15px;
      border-radius: 11px;
      cursor: pointer;
      background: var(--card);
      border: 1px solid var(--bdr);
      font-size: 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .15s;
      user-select: none
    }

    .opt:active {
      transform: scale(.98)
    }

    .opt.on {
      background: rgba(0, 229, 160, .09);
      border-color: rgba(0, 229, 160, .45);
      color: var(--a);
      font-weight: 600
    }

    /* ── step items ── */
    .si {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 11px;
      margin-bottom: 8px;
      background: var(--card);
      border: 1px solid var(--bdr);
      transition: all .35s
    }

    .si.act {
      border-color: rgba(0, 229, 160, .3);
      background: rgba(0, 229, 160, .04)
    }

    .si.done {
      border-color: rgba(0, 229, 160, .18);
      opacity: .7
    }

    .sic {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .sic.pend {
      background: var(--sub)
    }

    .sic.act {
      background: rgba(0, 229, 160, .12);
      animation: glow 1.5s infinite
    }

    .sic.done {
      background: rgba(0, 229, 160, .18)
    }

    /* ── gate ── */
    .gate {
      border-left: 3px solid var(--bdr);
      padding-left: 15px;
      margin-bottom: 14px;
      transition: border-color .35s
    }

    .gate.act {
      border-color: var(--a)
    }

    .gate.done {
      border-color: rgba(0, 229, 160, .35)
    }

    /* ── divider ── */
    .div {
      height: 1px;
      background: var(--bdr);
      margin: 16px 0
    }

    /* ── ai badge ── */
    .aib {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      background: linear-gradient(135deg, rgba(0, 229, 160, .08), rgba(14, 165, 233, .08));
      border: 1px solid rgba(0, 229, 160, .2);
      border-radius: 18px;
      font-size: 11px;
      font-weight: 700;
      color: var(--a);
      letter-spacing: .04em
    }

    /* ── spinner ── */
    .spin {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(0, 229, 160, .2);
      border-top-color: var(--a);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0
    }

    /* ── header ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800
    }

    .logo em {
      color: var(--a);
      font-style: normal
    }

    /* ── section heading ── */
    .sh {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--m);
      margin-bottom: 10px
    }

    /* ── check circle ── */
    .cc {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0, 229, 160, .1);
      border: 2px solid var(--a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      animation: glow 2s infinite
    }

    /* ── map box ── */
    .mb {
      background: var(--sub);
      border-radius: 14px;
      height: 195px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--bdr)
    }

    /* ── big number ── */
    .big {
      font-family: 'Syne', sans-serif;
      font-size: 60px;
      font-weight: 800;
      color: var(--a);
      line-height: 1;
      animation: big .45s cubic-bezier(.22, 1, .36, 1) .1s both
    }

    /* ── toast ── */
    .toast {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surf2);
      border: 1px solid var(--a);
      border-radius: 11px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      white-space: nowrap;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .5);
      animation: fadeIn .3s ease
    }

    /* ── navbar ── */
    .nb {
      display: flex;
      justify-content: space-around;
      padding: 10px 4px 14px;
      background: var(--surf2);
      border-top: 1px solid var(--bdr);
      flex-shrink: 0
    }

    .ni {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 10px;
      transition: all .2s
    }

    .ni.on {
      background: rgba(0, 229, 160, .1)
    }

    .ni svg {
      opacity: .4
    }

    .ni.on svg {
      opacity: 1
    }

    .ni span {
      font-size: 10px;
      color: var(--m);
      font-weight: 600
    }

    .ni.on span {
      color: var(--a)
    }

    /* ── admin ── */
    .aw {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg)
    }

    .asb {
      width: 200px;
      background: var(--surf);
      border-right: 1px solid var(--bdr);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0
    }

    .asi {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 13px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--m);
      transition: all .2s
    }

    .asi.on {
      background: rgba(0, 229, 160, .1);
      color: var(--a)
    }

    .atb {
      background: var(--surf);
      border-bottom: 1px solid var(--bdr);
      padding: 12px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0
    }

    .am {
      flex: 1;
      overflow-y: auto;
      padding: 22px
    }

    .ag {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
      margin-bottom: 20px
    }

    @media(max-width:900px) {
      .ag {
        grid-template-columns: repeat(2, 1fr)
      }

      .asb {
        display: none
      }
    }

    .ac {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      padding: 16px
    }

    .fr {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 12px;
      background: rgba(239, 68, 68, .05);
      border: 1px solid rgba(239, 68, 68, .13);
      border-radius: 11px;
      margin-bottom: 8px
    }

    /* confetti */
    .cp {
      position: absolute;
      border-radius: 2px;
      animation: fall linear forwards
    }
  </style>
</head>

<body>
  <div id="shell"></div>

  <script>

    // STATE

    const S = {
      screen: 'login',
      loginMode: 'worker',   // 'worker' | 'admin'
      loginStep: 1,          // 1=phone 2=otp
      loginErr: '',
      qStep: 0,
      qAnswers: { platform: 'Swiggy', hours: '6–8 hrs', zone: 'Koramangala, Bengaluru', vehicle: 'Two-Wheeler', experience: '2–3 years', income: '₹18,000–₹25,000/mo' },
      planLoading: true, planPct: 0, planStepIdx: 0,
      payStep: 0,
      monTick: 0, monBad: false,
      triStep: 0,
      claimStep: 0,
      adminTab: 'overview',
      adminTick: 0,
      crisis: false, crisisN: 0,
      _ivs: [], _tos: []
    };

    function addIV(fn, ms) { const t = setInterval(fn, ms); S._ivs.push(t); return t; }
    function addTO(fn, ms) { const t = setTimeout(fn, ms); S._tos.push(t); return t; }
    function clearAll() { S._ivs.forEach(clearInterval); S._tos.forEach(clearTimeout); S._ivs = []; S._tos = []; }

    // ════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════
    function go(s) { clearAll(); S.screen = s; draw(); boot(s); }

    function boot(s) {
      if (s === 'plan') {
        S.planLoading = true; S.planPct = 0; S.planStepIdx = 0;
        let i = 0;
        addIV(() => { i++; S.planPct = Math.min(i * 21, 100); S.planStepIdx = Math.min(Math.floor(i / 1.2), 4); if (i >= 6) { S.planLoading = false; } draw(); }, 560);
      }
      if (s === 'activation') S.payStep = 0;
      if (s === 'monitoring') {
        S.monTick = 0; S.monBad = false;
        addIV(() => { S.monTick++; if (S.monTick % 2 === 0) draw(); }, 1000);
        addTO(() => { S.monBad = true; draw(); addTO(() => go('trigger'), 1800); }, 4200);
      }
      if (s === 'trigger') {
        S.triStep = 0;
        [1, 2, 3, 4].forEach(n => addTO(() => { S.triStep = n; draw(); }, n * 1200));
        addTO(() => go('claim'), 5600);
      }
      if (s === 'claim') {
        S.claimStep = 0;
        [1, 2, 3, 4].forEach(n => addTO(() => { S.claimStep = n; draw(); }, n * 1050));
        addTO(() => go('payout'), 5400);
      }
      if (s === 'payout') addTO(() => toast('💸 ₹403 credited · arjun.kumar@okicici'), 1200);
      if (s === 'admin') { S.adminTick = 0; addIV(() => { S.adminTick++; if (S.adminTick % 3 === 0) draw(); }, 1000); }
    }

    let _toastTimer = null;
    function toast(msg) {
      let el = document.getElementById('_toast');
      if (!el) { el = document.createElement('div'); el.id = '_toast'; document.body.appendChild(el); }
      el.innerHTML = `<div class="toast">${msg}</div>`;
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.innerHTML = ''; }, 3000);
    }

    // ════════════════════════════════════
    // DOM BUILDER — safe, no string hacks
    // ════════════════════════════════════
    function el(tag, attrs, ...kids) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs || {})) {
        if (k === 'class') e.className = v;
        else if (k === 'style') e.style.cssText = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const k of kids) {
        if (k == null) continue;
        if (typeof k === 'string') e.insertAdjacentHTML('beforeend', k);
        else e.appendChild(k);
      }
      return e;
    }
    function div(cls, style, ...kids) { return el('div', { class: cls, style: style || '' }, ...kids); }
    function h(html) { const d = document.createElement('div'); d.innerHTML = html; return d; }
    function svgEl(svgStr) { const d = document.createElement('div'); d.innerHTML = svgStr; return d.firstChild; }

      logoRow.insertAdjacentHTML('beforeend', `<span class="logo">zy<em>ro</em></span>`);

      );
      pg.appendChild(logoBlk);

      // tabs

      const tw = div(`tab ${isW ? 'on' : ''}`, 'cursor:pointer;', 'Rider Login');

      tw.addEventListener('click', () => { S.loginMode = 'worker'; S.loginStep = 1; S.loginErr = ''; draw(); });
      ta.addEventListener('click', () => { S.loginMode = 'admin'; S.loginErr = ''; draw(); });
      tabs.appendChild(tw); tabs.appendChild(ta);
      pg.appendChild(tabs);

      // form
      pg.appendChild(isW ? formWorker() : formAdmin());

    function formWorker() {
      const wrap = document.createDocumentFragment();
      if (S.loginStep === 1) {

        const row = div('icon-input', '');

          }

        wrap.appendChild(btn);
        wrap.appendChild(div('div', ''));
        const auto = el('button', { class: 'btn bs', style: 'font-size:13px;padding:12px;margin-top:0;', onclick: () => { S.role = 'worker'; go('onboarding'); } }, I.bolt, ' Auto-Login (Demo Speed)');

        if (S.loginErr) {
          const err = div('', 'color:var(--r);font-size:13px;margin-bottom:10px;'); err.textContent = S.loginErr; wrap.appendChild(err);

          }
        }, I.checkC.slice(0, I.checkC.indexOf(' width')), ' Verify & Login');
        wrap.appendChild(btn);
        wrap.appendChild(div('div', ''));
        const auto = el('button', { class: 'btn bs', style: 'font-size:13px;padding:12px;', onclick: () => { S.role = 'worker'; go('onboarding'); } }, I.bolt, ' Auto-Login');

    // ── ONBOARDING ──
    const QS = [
      { k: 'platform', q: 'Which platform do you work on?', opts: ['Swiggy', 'Zomato', 'Blinkit', 'Multiple Platforms'] },
      { k: 'hours', q: 'Average daily working hours?', opts: ['< 4 hrs', '4–6 hrs', '6–8 hrs', '8+ hrs'] },
      { k: 'zone', q: 'Primary delivery zone?', opts: ['Koramangala, Bengaluru', 'Andheri, Mumbai', 'Cyber City, Gurugram', 'T. Nagar, Chennai'] },
      { k: 'vehicle', q: 'Vehicle type?', opts: ['Two-Wheeler', 'Electric Scooter', 'Cycle', 'Three-Wheeler'] },
      { k: 'experience', q: 'Delivery experience?', opts: ['< 6 months', '6–12 months', '1–2 years', '2–3 years', '3+ years'] },
      { k: 'income', q: 'Average monthly income?', opts: ['< ₹12,000', '₹12,000–₹18,000', '₹18,000–₹25,000', '> ₹25,000'] },

    function pgOnboarding() {
      const qi = S.qStep;
      const q = QS[qi];
      const pct = Math.round(qi / QS.length * 100);

      const pg = div('pg', '');

      // header
      const hdr = div('hdr', '');
      hdr.insertAdjacentHTML('beforeend', `<div class="logo" style="font-size:20px;">zy<em>ro</em></div>`);
      hdr.insertAdjacentHTML('beforeend', `<span class="tg tg-b">${qi + 1} / ${QS.length}</span>`);
      pg.appendChild(hdr);

      // progress
      const pb = div('', 'margin-bottom:20px;');
      pb.insertAdjacentHTML('beforeend', `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--m);margin-bottom:6px;"><span>Building your risk profile</span><span>${pct}%</span></div>`);
      pb.insertAdjacentHTML('beforeend', `<div class="pb"><div class="pbf" style="width:${pct}%"></div></div>`);
      pg.appendChild(pb);

      // question
      const qEl = div('', 'font-size:18px;font-weight:700;margin-bottom:18px;line-height:1.4;font-family:Syne,sans-serif;');
      qEl.textContent = q.q;
      pg.appendChild(qEl);

      // options — built with DOM, zero string interpolation of values
      const opts = div('', 'flex:1;');
      q.opts.forEach((optVal, oi) => {
        const tile = div(`opt ${S.qAnswers[q.k] === optVal ? 'on' : ''}`, '');
        // check icon placeholder
        const ckSpan = document.createElement('span');
        ckSpan.innerHTML = S.qAnswers[q.k] === optVal ? I.check : '';
        tile.appendChild(ckSpan);
        tile.appendChild(document.createTextNode(optVal));

        tile.addEventListener('click', () => {
          // update state
          S.qAnswers[q.k] = optVal;
          // update all tiles in place — no re-render, no flicker
          const allTiles = opts.querySelectorAll('.opt');
          allTiles.forEach((t, i) => {
            const isNow = (i === oi);
            t.classList.toggle('on', isNow);
            t.querySelector('span').innerHTML = isNow ? I.check : '';
          });
        });
        opts.appendChild(tile);
      });
      pg.appendChild(opts);

      // nav buttons
      const nav = div('', 'margin-top:auto;padding-top:14px;');
      if (qi < QS.length - 1) {
        const nxt = el('button', { class: 'btn bp', onclick: () => { S.qStep++; draw(); } }, I.arrow, ' Next');

      } else {
        const done = el('button', { class: 'btn bp', onclick: () => go('plan') }, I.cpu, ' Get My AI Plan');

        const bk = el('button', { class: 'btn bs', style: 'margin-top:9px;padding:12px;font-size:14px;', onclick: () => { S.qStep--; draw(); } }, '← Back');
        nav.appendChild(bk);
      }
      pg.appendChild(nav);
      return pg;

      const cols = ['#00e5a0', '#0ea5e9', '#f59e0b', '#f472b6', '#a78bfa'];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');

        const w = 6 + Math.random() * 5;
        p.style.cssText = `left:${Math.random() * 100}%;top:0;width:${w}px;height:${w}px;background:${cols[i % 5]};animation-duration:${1.1 + Math.random() * .9}s;animation-delay:${Math.random() * .6}s;`;

    // ════════════════════════════════════
    // DRAW — builds DOM fresh each call
    // ════════════════════════════════════
    function draw() {
      const shell = document.getElementById('shell');
      shell.innerHTML = '';

      const s = S.screen;

      if (s === 'admin') {
        if (S.role !== 'admin') { S.screen = 'dashboard'; draw(); return; }
        shell.style.cssText = 'width:100%;max-width:100%;height:100vh;max-height:100vh;border-radius:0;border:none;';
        document.body.style.alignItems = 'flex-start';
        shell.appendChild(pgAdmin());
        return;
      }

      // Worker-only screens — if admin tries to access, bounce to admin panel
      const workerScreens = ['onboarding', 'plan', 'activation', 'monitoring', 'trigger', 'claim', 'payout', 'dashboard', 'policy', 'profile'];
      if (S.role === 'admin' && workerScreens.includes(s)) { S.screen = 'admin'; draw(); return; }
      document.body.style.alignItems = 'center';
      if (window.innerWidth >= 500) {
        shell.style.cssText = 'width:390px;height:820px;max-height:820px;border-radius:28px;border:1px solid var(--bdr);box-shadow:0 40px 80px rgba(0,0,0,.7);background:var(--surf);display:flex;flex-direction:column;overflow:hidden;position:relative;';
      } else {
        shell.style.cssText = 'width:100%;height:100vh;max-height:100vh;border-radius:0;background:var(--surf);display:flex;flex-direction:column;overflow:hidden;position:relative;';
      }

      let pg;
      switch (s) {
        case 'login': pg = pgLogin(); break;
        case 'onboarding': pg = pgOnboarding(); break;
        case 'plan': pg = pgPlan(); break;
        case 'activation': pg = pgActivation(); break;
        case 'monitoring': pg = pgMonitoring(); break;
        case 'trigger': pg = pgTrigger(); break;
        case 'claim': pg = pgClaim(); break;
        case 'payout': pg = pgPayout(); break;
        case 'dashboard': if (S.role === 'admin') { S.screen = 'admin'; draw(); return; } pg = pgDashboard(); break;
        case 'policy': pg = pgPolicy(); break;
        case 'profile': pg = pgProfile(); break;
        default: pg = pgLogin();
      }

      shell.appendChild(pg);
      const nb = navbar(s);
      if (nb) shell.appendChild(nb);
    }

    draw();
  </script>
